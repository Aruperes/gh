<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Absensi Asrama GH</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #121212;
        color: white;
      }
      .card {
        background-color: #1e1e1e;
        color: white;
        border: none;
      }
      .table {
        color: white;
      }
      .video-feed {
        width: 100%;
        border-radius: 10px;
        border: 2px solid #00ff00;
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <h1 class="text-center mb-5">🚀 AI Facial Attendance - Asrama GH</h1>

      <div class="row">
        <div class="col-md-7">
          <div class="card p-3">
            <h5 class="card-title">Live Camera Feed</h5>
            <img src="{{ url_for('video_feed') }}" class="video-feed" />
          </div>
        </div>

        <div class="col-md-5">
          <div class="card p-3">
            <h5 class="card-title">Daftar Hadir Terkini</h5>
            <div class="table-responsive">
              <table class="table table-dark table-hover mt-3">
                <thead>
                  <tr>
                    <th>Nama Mahasiswa</th>
                    <th>Jam Masuk</th>
                  </tr>
                </thead>
                <tbody>
                  {% for name, time in attendance.items() %}
                  <tr>
                    <td class="text-success fw-bold">{{ name }}</td>
                    <td>{{ time }}</td>
                  </tr>
                  {% endfor %}
                </tbody>
              </table>
            </div>
            <button
              onclick="window.location.reload()"
              class="btn btn-outline-success mt-3"
            >
              Update List
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Auto-refresh setiap 5 detik untuk cek absen baru
      setTimeout(function () {
        window.location.reload();
      }, 5000);
    </script>
  </body>
</html>
