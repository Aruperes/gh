<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Log History - GH System</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-950 text-slate-200 p-8">
    <div class="max-w-4xl mx-auto">
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-bold">
          <i class="fas fa-clock mr-3 text-blue-500"></i>Attendance Logs
        </h2>
        <a href="/dashboard" class="bg-slate-800 px-4 py-2 rounded-lg text-sm"
          >Kembali</a
        >
      </div>

      <div
        class="bg-slate-900 rounded-3xl overflow-hidden border border-slate-800"
      >
        <table class="w-full text-left">
          <thead class="bg-slate-800 text-slate-400 text-xs uppercase">
            <tr>
              <th class="p-4">Timestamp</th>
              <th class="p-4">Nama Mahasiswa</th>
              <th class="p-4">Status</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-800">
            {% for item in history|reverse %}
            <tr class="hover:bg-slate-800/50 transition">
              <td class="p-4 font-mono text-blue-400">{{ item.waktu }}</td>
              <td class="p-4 font-bold">{{ item.nama }}</td>
              <td class="p-4">
                {% if item.nama == "STRANGER / BUKAN ASRAMA" %}
                <span
                  class="text-red-400 bg-red-400/10 px-2 py-1 rounded text-xs"
                  >Unknown</span
                >
                {% else %}
                <span
                  class="text-green-400 bg-green-400/10 px-2 py-1 rounded text-xs"
                  >Verified</span
                >
                {% endif %}
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
