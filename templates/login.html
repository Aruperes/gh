<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Asrama GH AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: radial-gradient(circle at top left, #0d1117, #161b22);
      }
      .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-6 text-white">
    <div class="glass w-full max-auto max-w-md p-8 rounded-2xl shadow-2xl">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold tracking-tight text-blue-400">
          ASRAMA <span class="text-white">GH</span>
        </h1>
        <p class="text-gray-400 text-sm mt-2">
          AI Face Recognition Attendance System
        </p>
      </div>

      {% with messages = get_flashed_messages() %} {% if messages %} {% for
      message in messages %}
      <div
        class="bg-red-500/20 border border-red-500 text-red-200 p-3 rounded-lg mb-4 text-sm"
      >
        {{ message }}
      </div>
      {% endfor %} {% endif %} {% endwith %}

      <form method="POST" class="space-y-6">
        <div>
          <label
            class="block text-xs uppercase tracking-widest text-gray-400 mb-2"
            >Username</label
          >
          <input
            type="text"
            name="username"
            class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-blue-500 transition-all"
            placeholder="Enter username"
            required
          />
        </div>
        <div>
          <label
            class="block text-xs uppercase tracking-widest text-gray-400 mb-2"
            >Password</label
          >
          <input
            type="password"
            name="password"
            class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-blue-500 transition-all"
            placeholder="••••••••"
            required
          />
        </div>
        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg shadow-lg shadow-blue-900/20 transition-all transform hover:-translate-y-1"
        >
          ACCESS SYSTEM
        </button>
      </form>
    </div>
  </body>
</html>
