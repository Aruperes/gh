<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dining GuestHouse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background: radial-gradient(circle, #1a202c 0%, #0f172a 100%);
      }
      .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>
  <body class="flex items-center justify-center min-h-screen text-white">
    <div class="glass p-8 rounded-2xl shadow-2xl w-96">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold tracking-widest text-blue-400">
          DINING GUESTHOUSE
        </h1>
        <p class="text-gray-400 text-sm">Security AI Recognition System</p>
      </div>

      {% with messages = get_flashed_messages() %} {% if messages %} {% for
      message in messages %}
      <div
        class="bg-red-500/20 border border-red-500 text-red-200 p-3 rounded mb-4 text-xs"
      >
        {{ message }}
      </div>
      {% endfor %} {% endif %} {% endwith %}

      <form action="/login" method="POST" class="space-y-6">
        <div>
          <label
            class="block text-xs uppercase tracking-wider text-gray-400 mb-2"
            >Username</label
          >
          <input
            type="text"
            name="username"
            class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 focus:outline-none focus:border-blue-500 transition"
            required
          />
        </div>
        <div>
          <label
            class="block text-xs uppercase tracking-wider text-gray-400 mb-2"
            >Password</label
          >
          <input
            type="password"
            name="password"
            class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 focus:outline-none focus:border-blue-500 transition"
            required
          />
        </div>
        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold transition shadow-lg shadow-blue-500/20"
        >
          INITIALIZE ACCESS
        </button>
      </form>
    </div>
  </body>
</html>
