<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Master Data - GH System</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-950 text-slate-200 p-8">
    <div class="max-w-4xl mx-auto">
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-bold">
          <i class="fas fa-database mr-3 text-purple-500"></i>Registered
          Students
        </h2>
        <a href="/dashboard" class="bg-slate-800 px-4 py-2 rounded-lg text-sm"
          >Kembali</a
        >
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        {% for mhs in mahasiswa %}
        <div
          class="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex items-center gap-4"
        >
          <div
            class="w-12 h-12 bg-slate-800 rounded-full flex items-center justify-center text-xl font-bold text-blue-400"
          >
            {{ mhs.nama[0] }}
          </div>
          <div>
            <h4 class="font-bold">{{ mhs.nama }}</h4>
            <p class="text-xs text-slate-500">
              ID: {{ mhs.id }} | Role: {{ mhs.status }}
            </p>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
